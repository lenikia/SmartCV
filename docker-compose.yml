services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend

    ports:
      - "5173:5173"

    environment:
      - VITE_API_URL=${VITE_API_URL}

    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

